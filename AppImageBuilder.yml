version: 1

AppDir:
  path: ./AppDir

  app_info:
    id: it.andreafontana.hideout
    name: Hideout
    icon: it.andreafontana.hideout
    version: ${VERSION}
    exec: usr/bin/hideout
    exec_args: $@

  apt:
    arch: amd64
    sources:
      - sourceline: 'deb http://archive.ubuntu.com/ubuntu/ noble main restricted universe multiverse'
      - sourceline: 'deb http://archive.ubuntu.com/ubuntu/ noble-updates main restricted universe multiverse'
    include:
      - libglib2.0-0
      - libgtk-4-1
      - libadwaita-1-0
      - gnupg2
      - libphobos2-ldc-shared108
    exclude:
      - dconf
      - libdconf1
      - sound-theme-freedesktop

  files:
    include: []
    exclude:
      - usr/lib/x86_64-linux-gnu/gconv
      - usr/share/man
      - usr/share/doc

AppImage:
  update-information: 'gh-releases-zsync|trikko|hideout|latest|Hideout-*.AppImage.zsync'
  sign-key: None
  arch: x86_64
