name: Build

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set VERSION from tag
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        TAG_VERSION=${GITHUB_REF#refs/tags/v}
        echo "$TAG_VERSION" > data/VERSION
        echo "Version set to $TAG_VERSION"
    
    - name: Install D compiler
      uses: dlang-community/setup-dlang@v1
      with:
        compiler: ldc-latest

    - name: Install GTK4 and Libadwaita
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-4-dev libadwaita-1-dev

    - name: Build
      run: dub build -c application --compiler=ldc2 --build=release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: hideout-ubuntu-latest
        path: hideout
