name: Flatpak

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]

jobs:
  flatpak:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install flatpak and flatpak-builder
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak flatpak-builder
        flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
        flatpak install --user -y flathub org.gnome.Sdk/x86_64/50 org.gnome.Platform/x86_64/50
    
    - name: Set VERSION from tag
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        TAG_VERSION=${GITHUB_REF#refs/tags/v}
        echo "$TAG_VERSION" > data/VERSION
        echo "Version set to $TAG_VERSION"
    
    - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      with:
        bundle: hideout.flatpak
        manifest-path: it.andreafontana.hideout.yml
        cache-key: flatpak-builder-${{ github.sha }}
        install-deps-from: ""
